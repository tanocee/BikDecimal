name: Publish to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: macos-latest # Required for iOS target build

    steps:
      - name: Check user organization membership
        run: |
          # Fetch user's membership status for the 'tanocee' organization
          STATUS=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/tanocee/members/${{ github.actor }})
          
          # If the response contains a 404 message or the user is not found,
          # it implies the user is not a member of the organization.
          if echo "$STATUS" | grep -q '"message": "Not Found"'; then
            echo "Error: User ${{ github.actor }} is not a member of the 'tanocee' organization."
            exit 1
          fi
          echo "User ${{ github.actor }} is a verified member of 'tanocee'."
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-daemon
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
